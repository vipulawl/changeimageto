# Daily GSC + GA4 performance snapshots for blog posts
name: Blogging Agent — Monitor

on:
  schedule:
    - cron: "0 8 * * *"  # Daily 8am UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: blog-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/blogging-agent/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/blogging-agent/requirements.txt

      - name: Configure credentials
        env:
          GA4_CREDENTIALS_JSON: ${{ secrets.GA4_CREDENTIALS_JSON }}
          GSC_CREDENTIALS_JSON: ${{ secrets.GSC_CREDENTIALS_JSON }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BLOG_PROVIDER: ${{ vars.BLOG_PROVIDER || 'openai' }}
          BLOG_APPROVAL_MODE: auto
        run: python scripts/blogging-agent/setup_ci.py

      - name: Seed post memory
        working-directory: scripts/blogging-agent
        run: python seed_memory.py

      - name: Run monitor
        working-directory: scripts/blogging-agent
        run: python main.py monitor

      - name: Persist agent state
        if: always()
        run: |
          git config user.name "Blogging Agent"
          git config user.email "bot@noreply.github.com"
          git add -f scripts/blogging-agent/blogging_agent.db 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: blogging agent monitor state [skip ci]" && git push || true
