# Research → write → auto-publish blog posts for ChangeImageTo.com
name: Blogging Agent — Pipeline

on:
  schedule:
    - cron: "0 10 * * 1,3,5"  # Mon/Wed/Fri 10am UTC
  workflow_dispatch:
    inputs:
      action:
        description: "Action"
        type: choice
        options: [pipeline, research, write, strategy, seed]
        default: pipeline

permissions:
  contents: write

concurrency:
  group: blog-pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/blogging-agent/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/blogging-agent/requirements.txt

      - name: Configure credentials
        env:
          GA4_CREDENTIALS_JSON: ${{ secrets.GA4_CREDENTIALS_JSON }}
          GSC_CREDENTIALS_JSON: ${{ secrets.GSC_CREDENTIALS_JSON }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BLOG_PROVIDER: ${{ vars.BLOG_PROVIDER || 'openai' }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o' }}
          BLOG_NICHE: ${{ vars.BLOG_NICHE || 'free online image editing tools' }}
          TARGET_AUDIENCE: ${{ vars.TARGET_AUDIENCE || 'ecommerce sellers, designers, and content creators' }}
          BLOG_TONE: ${{ vars.BLOG_TONE || 'practical, helpful, and SEO-focused' }}
          BLOG_APPROVAL_MODE: auto
          MAX_ARTICLES_PER_DAY: ${{ vars.MAX_ARTICLES_PER_DAY || '1' }}
          MIN_QUEUE_SIZE: ${{ vars.MIN_QUEUE_SIZE || '2' }}
        run: python scripts/blogging-agent/setup_ci.py

      - name: Configure git
        run: |
          git config user.name "Blogging Agent"
          git config user.email "bot@noreply.github.com"

      - name: Seed post memory
        working-directory: scripts/blogging-agent
        run: python seed_memory.py

      - name: Build strategy if missing
        working-directory: scripts/blogging-agent
        env:
          STRATEGY_NICHE: "Free online image editing — remove background, change colors, resize, blur, upscale, enhance"
          STRATEGY_GOAL: "organic SEO traffic for changeimageto.com"
          STRATEGY_TARGET_READER: "ecommerce sellers, social media managers, designers, and developers who need quick image fixes"
          STRATEGY_DESIRED_ACTION: "use ChangeImageTo.com free tools"
          STRATEGY_AVOID: "NSFW content, piracy, illegal image manipulation"
          STRATEGY_FREQUENCY: "twice a week"
        run: |
          python -c "from storage.db import get_active_strategy; import sys; sys.exit(0 if get_active_strategy() else 1)" \
            || python main.py strategy --auto --force

      - name: Run pipeline
        working-directory: scripts/blogging-agent
        run: python main.py ${{ github.event.inputs.action || 'pipeline' }}

      - name: Persist agent state
        if: always()
        run: |
          git add -f scripts/blogging-agent/blogging_agent.db 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: blogging agent state [skip ci]" && git push || true
